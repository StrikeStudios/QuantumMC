name: PR Commands

on:
  issue_comment:
    types: [created]

jobs:
  approve:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/approve') &&
      github.event.comment.user.login == 'xRookieFight'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Approve PR
        run: gh pr review "${{ github.event.issue.number }}" --approve --repo "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
