name: Nightly Build
on:
  push:
    branches: [ master ]
jobs:
  nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build
      run: dotnet build src/QuantumMC/QuantumMC.csproj --configuration Release

    - name: Update nightly release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
      run: |
        ASSET=src/QuantumMC/bin/Release/net10.0/QuantumMC.dll

        RELEASE_ID=$(gh api repos/$GH_REPO/releases/tags/nightly --jq '.id' 2>/dev/null || true)

        if [ -n "$RELEASE_ID" ]; then
          gh api -X PATCH repos/$GH_REPO/releases/$RELEASE_ID \
            -f tag_name=nightly \
            -f name="Nightly Build" \
            -F prerelease=true \
            -f make_latest=false

          gh api repos/$GH_REPO/releases/$RELEASE_ID/assets --jq '.[].id' | \
            while read -r asset_id; do
              gh api -X DELETE repos/$GH_REPO/releases/assets/$asset_id
            done

          gh release upload nightly "$ASSET" --clobber
        else
          gh release create nightly \
            --title "Nightly Build" \
            --prerelease \
            --latest=false \
            "$ASSET"
        fi
